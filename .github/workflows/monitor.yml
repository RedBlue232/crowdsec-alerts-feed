name: Monitor feed freshness

on:
  schedule:
    - cron: "0 */13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate feeds
        id: validate
        run: python3 tools/validate_feeds.py

      - name: Ouvrir une issue si échec
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Feed non mis à jour",
              body: "Le workflow de monitoring a détecté un problème. Vérifier le pipeline de publication."
            });
